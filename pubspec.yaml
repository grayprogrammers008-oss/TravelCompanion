name: travel_crew
description: "Travel Crew - Your ultimate group travel companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Backend & Database
  supabase_flutter: ^2.5.6  # Supabase backend (online-only mode)
  supabase: ^2.2.0  # Standalone Supabase client for scripts
  path_provider: ^2.1.1
  path: ^1.8.3

  # Navigation
  go_router: ^16.3.0

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  equatable: ^2.0.5
  # freezed_annotation: ^3.1.0  # TEMPORARILY DISABLED
  # json_annotation: ^4.9.0  # TEMPORARILY DISABLED
  crypto: ^3.0.3

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.3+1

  # Firebase (compatible with Dart 3.2.6)
  firebase_core: ^4.2.0
  firebase_messaging: ^16.0.3

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # URL Launcher (for UPI/Paytm)
  url_launcher: ^6.3.0

  # Share functionality
  share_plus: ^10.1.2

  # Receive shared content from other apps
  receive_sharing_intent: ^1.8.1

  # QR Code Generation
  qr_flutter: ^4.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Location Services
  geolocator: ^13.0.2

  # Maps (OpenStreetMap - free)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Device Info
  device_info_plus: ^11.1.0

  # Image Picker
  image_picker: ^1.0.7

  # File Picker (for documents)
  file_picker: ^8.0.0+1

  # Connectivity
  connectivity_plus: ^6.0.0

  # Bluetooth LE for P2P Messaging
  flutter_blue_plus: ^1.32.12

  # WiFi Direct P2P Messaging (Android)
  flutter_p2p_connection: ^3.0.3

  # Multipeer Connectivity P2P Messaging (iOS) - TODO: Find alternative package
  # nearby_service: ^0.3.2  # Package not available on pub.dev

  # Encryption for E2E messaging
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Local Notifications
  flutter_local_notifications: ^18.0.1

  # Speech Recognition (on-device, free)
  speech_to_text: ^7.0.0

  # Audio Recording (for cloud speech-to-text)
  record: ^6.1.2

  # PDF Generation & Printing
  pdf: ^3.11.1
  printing: ^5.13.3

  # ML Kit Text Recognition (for bill scanning)
  google_mlkit_text_recognition: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  # freezed: ^3.2.3  # TEMPORARILY DISABLED
  # json_serializable: ^6.8.0  # TEMPORARILY DISABLED
  riverpod_generator: ^3.0.3

  # Testing
  mockito: ^5.4.4
  faker: ^2.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/images/destinations/
    - assets/images/illustrations/
    - assets/images/placeholders/
    - assets/loader.gif
    - assets/config/test_users.json

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
