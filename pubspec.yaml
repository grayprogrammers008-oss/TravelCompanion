name: travel_crew
description: "Travel Crew - Your ultimate group travel companion app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2

  # Backend & Database
  # supabase_flutter: ^2.5.6  # DISABLED - Using SQLite for local development
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # Navigation
  go_router: ^16.2.4

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.20.2
  # freezed_annotation: ^3.1.0  # TEMPORARILY DISABLED
  # json_annotation: ^4.9.0  # TEMPORARILY DISABLED
  crypto: ^3.0.3

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.3+1

  # Firebase (compatible with Dart 3.2.6)
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # URL Launcher (for UPI/Paytm)
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  # freezed: ^3.2.3  # TEMPORARILY DISABLED
  # json_serializable: ^6.8.0  # TEMPORARILY DISABLED
  riverpod_generator: ^3.0.2

  # Testing
  mockito: ^5.4.4
  faker: ^2.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Assets
  assets:
    - assets/images/destinations/
    - assets/images/illustrations/
    - assets/images/placeholders/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
