<?xml version="1.0" encoding="UTF-8"?>
<!-- TravelCompanion - Monochrome Logo (for documents, watermarks, embossing) -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Main globe circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="currentColor" stroke-width="8"/>

  <!-- Globe meridians -->
  <g stroke="currentColor" stroke-width="3" fill="none" opacity="0.4">
    <ellipse cx="256" cy="256" rx="220" ry="80"/>
    <ellipse cx="256" cy="256" rx="220" ry="160"/>
    <ellipse cx="256" cy="256" rx="80" ry="220"/>
    <ellipse cx="256" cy="256" rx="160" ry="220"/>
  </g>

  <!-- Compass/Plane -->
  <g transform="translate(256, 256)" fill="currentColor">
    <path
      d="M-30 60 L0 -100 L30 60 L0 30 Z"
      transform="rotate(-45)"
    />
    <path
      d="M-80 20 L0 -20 L80 20 L0 0 Z"
      transform="rotate(-45)"
      opacity="0.6"
    />
  </g>

  <!-- Location pin -->
  <g transform="translate(340, 140)" fill="currentColor">
    <path
      d="M0 0 C-25 0 -45 20 -45 45 C-45 75 0 110 0 110 C0 110 45 75 45 45 C45 20 25 0 0 0 Z"
    />
    <circle cx="0" cy="42" r="18" fill="white"/>
  </g>

  <!-- Companions -->
  <g transform="translate(130, 320)" stroke="currentColor" fill="currentColor">
    <path
      d="M0 0 Q60 -40 120 0"
      stroke-width="4"
      stroke-linecap="round"
      stroke-dasharray="8 6"
      fill="none"
    />
    <circle cx="0" cy="0" r="12"/>
    <circle cx="120" cy="0" r="12"/>
  </g>
</svg>
