<?xml version="1.0" encoding="UTF-8"?>
<!-- TravelCompanion - Simplified App Icon -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>

    <!-- Warm accent -->
    <linearGradient id="iconAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>

    <!-- iOS style shadow -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Rounded square background for app icon -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#iconGradient)" filter="url(#iconShadow)"/>

  <!-- Subtle globe lines -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="3" fill="none" transform="translate(256, 256)">
    <ellipse cx="0" cy="0" rx="180" ry="70"/>
    <ellipse cx="0" cy="0" rx="70" ry="180"/>
  </g>

  <!-- Compass/Plane pointing to adventure -->
  <g transform="translate(256, 256)">
    <!-- Main arrow/compass needle -->
    <path
      d="M-35 70 L0 -120 L35 70 L0 35 Z"
      fill="white"
      transform="rotate(-45)"
    />

    <!-- Accent wing -->
    <path
      d="M-90 25 L0 -25 L90 25 L0 5 Z"
      fill="url(#iconAccent)"
      transform="rotate(-45)"
    />
  </g>

  <!-- Location marker -->
  <g transform="translate(355, 130)">
    <path
      d="M0 -5 C-22 -5 -40 15 -40 40 C-40 68 0 100 0 100 C0 100 40 68 40 40 C40 15 22 -5 0 -5 Z"
      fill="url(#iconAccent)"
    />
    <circle cx="0" cy="37" r="15" fill="white"/>
  </g>

  <!-- Companion connection -->
  <g transform="translate(140, 340)">
    <path
      d="M0 0 Q55 -35 110 0"
      stroke="white"
      stroke-width="5"
      stroke-linecap="round"
      stroke-dasharray="10 8"
      fill="none"
      opacity="0.8"
    />
    <circle cx="0" cy="0" r="14" fill="white"/>
    <circle cx="110" cy="0" r="14" fill="white"/>
  </g>
</svg>
