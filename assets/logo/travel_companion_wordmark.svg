<?xml version="1.0" encoding="UTF-8"?>
<!-- TravelCompanion - Full Wordmark Logo -->
<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wordmarkGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="50%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>

    <linearGradient id="wordmarkAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>

    <filter id="wordmarkShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0EA5E9" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Icon (scaled down) -->
  <g transform="translate(20, 15) scale(0.33)">
    <!-- Globe -->
    <circle cx="256" cy="256" r="220" fill="url(#wordmarkGradient)" filter="url(#wordmarkShadow)"/>

    <!-- Globe lines -->
    <g stroke="rgba(255,255,255,0.2)" stroke-width="2" fill="none">
      <ellipse cx="256" cy="256" rx="220" ry="80"/>
      <ellipse cx="256" cy="256" rx="80" ry="220"/>
    </g>

    <!-- Compass -->
    <g transform="translate(256, 256)">
      <path d="M-30 60 L0 -100 L30 60 L0 30 Z" fill="white" transform="rotate(-45)"/>
      <path d="M-80 20 L0 -20 L80 20 L0 0 Z" fill="url(#wordmarkAccent)" transform="rotate(-45)"/>
    </g>

    <!-- Pin -->
    <g transform="translate(340, 140)">
      <path d="M0 0 C-25 0 -45 20 -45 45 C-45 75 0 110 0 110 C0 110 45 75 45 45 C45 20 25 0 0 0 Z" fill="url(#wordmarkAccent)"/>
      <circle cx="0" cy="42" r="18" fill="white"/>
    </g>

    <!-- Companions -->
    <g transform="translate(130, 320)">
      <path d="M0 0 Q60 -40 120 0" stroke="white" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 6" fill="none"/>
      <circle cx="0" cy="0" r="12" fill="white"/>
      <circle cx="120" cy="0" r="12" fill="white"/>
    </g>
  </g>

  <!-- Text: "Travel" -->
  <text x="210" y="115" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="72" font-weight="700" fill="url(#wordmarkGradient)">
    Travel
  </text>

  <!-- Text: "Companion" -->
  <text x="420" y="115" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="72" font-weight="300" fill="#374151">
    Companion
  </text>

  <!-- Tagline -->
  <text x="210" y="155" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif" font-size="18" font-weight="400" fill="#9CA3AF" letter-spacing="3">
    EXPLORE TOGETHER
  </text>
</svg>
