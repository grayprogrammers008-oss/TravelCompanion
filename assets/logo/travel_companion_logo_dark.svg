<?xml version="1.0" encoding="UTF-8"?>
<!-- TravelCompanion - Dark Mode Logo -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark mode gradient - Deeper, richer colors -->
    <linearGradient id="darkGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0369A1"/>
      <stop offset="50%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#0D9488"/>
    </linearGradient>

    <!-- Vibrant accent for dark mode -->
    <linearGradient id="darkAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C"/>
      <stop offset="100%" style="stop-color:#FCD34D"/>
    </linearGradient>

    <!-- Glow effect for dark mode -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="darkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0EA5E9" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Main globe circle -->
  <circle cx="256" cy="256" r="220" fill="url(#darkGradient)" filter="url(#darkShadow)"/>

  <!-- Globe meridians - slightly brighter for dark mode -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none">
    <ellipse cx="256" cy="256" rx="220" ry="80"/>
    <ellipse cx="256" cy="256" rx="220" ry="160"/>
    <ellipse cx="256" cy="256" rx="80" ry="220"/>
    <ellipse cx="256" cy="256" rx="160" ry="220"/>
  </g>

  <!-- Compass/Plane with glow -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <path
      d="M-30 60 L0 -100 L30 60 L0 30 Z"
      fill="white"
      transform="rotate(-45)"
    />
    <path
      d="M-80 20 L0 -20 L80 20 L0 0 Z"
      fill="url(#darkAccent)"
      transform="rotate(-45)"
    />
  </g>

  <!-- Location pin with glow -->
  <g transform="translate(340, 140)" filter="url(#glow)">
    <path
      d="M0 0 C-25 0 -45 20 -45 45 C-45 75 0 110 0 110 C0 110 45 75 45 45 C45 20 25 0 0 0 Z"
      fill="url(#darkAccent)"
    />
    <circle cx="0" cy="42" r="18" fill="white"/>
  </g>

  <!-- Companions with enhanced visibility -->
  <g transform="translate(130, 320)">
    <path
      d="M0 0 Q60 -40 120 0"
      stroke="white"
      stroke-width="4"
      stroke-linecap="round"
      stroke-dasharray="8 6"
      fill="none"
      opacity="0.9"
    />
    <circle cx="0" cy="0" r="12" fill="white"/>
    <circle cx="120" cy="0" r="12" fill="white"/>
  </g>

  <!-- Highlight -->
  <ellipse
    cx="180" cy="140"
    rx="80" ry="40"
    fill="white"
    opacity="0.08"
    transform="rotate(-30, 180, 140)"
  />
</svg>
